server:
  port: 9092

# Profile：注册中心类型：cse/nacos
spring:
  application:
    # 微服务名称。 微服务名称定义好以后，后续不能变更。
    name: basic-consumer
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:http://127.0.0.1:8848}
        service: ${spring.application.name}
      config:
        enabled: true
        server-addr: ${NACOS_SERVER_ADDR:http://127.0.0.1:8848}
        file-extension: yaml
        shared-configs[0]:
          data-id: consumer.yaml
          group: DEFAULT_GROUP
          refresh: true